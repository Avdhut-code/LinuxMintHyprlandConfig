# Tools Required for LinuxMintHyprlandConfig Installation
# Install these before running install.sh

# CORE COMPOSITOR & DESKTOP ENVIRONMENT (Required)
hyprland              # Wayland compositor (main window manager)
hyprlock              # Screen lock application
hypridle              # Idle daemon (auto-lock, DPMS control)
waybar                # Top status bar/panel
wofi                  # Application launcher (rofi alternative)

# SYSTEM TOOLS (Required)
ddcutil               # Display brightness control (via DDC-CI)
swaybg                # Wallpaper setter for Wayland
playerctl             # Media player control
amixer                # ALSA mixer (volume/audio control)
btop                  # System monitor
swaync                # Notification center daemon
libnotify             # Notification library (for notify-send)
gsettings-desktop-schemas  # For GTK theme settings via gsettings
dconf-cli             # Configuration management tool

# APPLICATIONS (Required)
gnome-terminal        # Terminal emulator
nemo                  # File manager
xed                   # Text editor

# OPTIONAL APPLICATIONS (Recommended)
code                  # Visual Studio Code (keybind Super+Shift+V)
obsidian              # Note-taking application (keybind Super+Shift+O)
zen                   # Zen Browser (keybind Super+Shift+F, webapp launcher)
mpv                   # Video player (codecho.sh --play function)
hyprshot              # Screenshot utility (git install, not apt)
gnome-calendar        # Calendar application (waybar click)
pavucontrol           # PulseAudio volume control (waybar click)
nm-connection-editor  # Network manager GUI (waybar click)

# SYSTEM UTILITIES (Pre-installed, no apt needed)
hyprctl               # Hyprland control (comes with hyprland)
notify-send           # Send notifications (comes with libnotify)
playerctl             # Already listed above
amixer                # Already listed above
ddcutil               # Already listed above

# NOTES:
# - hyprshot requires manual git install: see install.sh comments
# - ddcutil may need: sudo usermod -aG i2c $USER (for non-root brightness)
# - zen browser: visit https://www.zen-browser.com/ for installation
# - Optional tools can be installed later; core tools must be pre-installed
